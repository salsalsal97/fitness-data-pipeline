name: Daily Fitness Pipeline

on:
  schedule:
    - cron: "31 18 * * *" # Runs 19:31 UK time (18:31 in winter)
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create secrets files
        run: |
          mkdir -p secrets
          printf '%s' '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > secrets/credentials.json
          printf '%s' '${{ secrets.MFP_COOKIES_TXT }}' > secrets/cookies.txt
      - name: Run pipeline
        run: |
          python -m scripts.run_mfp_daily