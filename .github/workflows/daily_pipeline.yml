name: Daily Fitness Pipeline

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Create secrets files
        run: |
          mkdir -p secrets
          echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" > secrets/credentials.json
          echo "${{ secrets.MFP_COOKIES_TXT }}" > secrets/cookies.txt

      - name: Run pipeline
        run: |
          python scripts/run_mfp_daily.py